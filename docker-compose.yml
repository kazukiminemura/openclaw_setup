services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw-custom:latest
    container_name: openclaw
    user: root
    network_mode: host
    stdin_open: true
    tty: true
    working_dir: /home/appuser
    environment:
      HOME: /home/appuser
      DISPLAY: ${DISPLAY}
      TZ: Asia/Tokyo
    volumes:
      # タイムゾーン同期
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

      # X11 GUI
      - /tmp/.X11-unix:/tmp/.X11-unix

      # Threads データ
      - /home/$USER/threads:/run/threads:ro

    user: appuser

volumes:
  openclaw_config:
