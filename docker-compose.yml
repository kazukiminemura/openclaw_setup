services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw-custom:latest
    container_name: openclaw
    user: root
    network_mode: host
    stdin_open: true
    tty: true
    working_dir: /root
    environment:
      DISPLAY: ${DISPLAY}
      TZ: Asia/Tokyo
    volumes:
      # タイムゾーン同期
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

      # X11 GUI
      - /tmp/.X11-unix:/tmp/.X11-unix

      # Threads データ
      - /home/threads-001/threads:/run/threads:ro

      # 永続化
      - openclaw_home:/root
      - openclaw_config:/config
      - openclaw_workspace:/workspace

    command: bash

volumes:
  openclaw_home:
  openclaw_config:
  openclaw_workspace:
