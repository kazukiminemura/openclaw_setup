services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:main
    container_name: openclaw
    user: root
    network_mode: host
    stdin_open: true
    tty: true
    working_dir: /root

    environment:
      DISPLAY: ${DISPLAY}
      TZ: Asia/Tokyo

    volumes:
      # タイムゾーン同期
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

      # X11 GUI 用
      - /tmp/.X11-unix:/tmp/.X11-unix

      # あなたの Threads データを読み取り専用でマウント
      - /home/threads-001/threads:/run/threads:ro

      # OpenClaw の設定を永続化
      - openclaw_home:/root
      - openclaw_config:/config
      - openclaw_workspace:/workspace

    command: >
      bash -lc "
        apt update &&
        DEBIAN_FRONTEND=noninteractive apt install -y
          curl
          git
          vim
          x11-apps
          fonts-noto-cjk
          fonts-noto-color-emoji
          fonts-ipafont
          python3.11-venv &&
        fc-cache -fv &&
        echo 'OpenClaw container is ready.' &&
        bash
      "

volumes:
  openclaw_home:
  openclaw_config:
  openclaw_workspace:
